<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasar CoA - Merchant Pro (Paginated)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#111827',
                        cardBg: '#1f2937',
                        accent: '#8b5cf6',
                        textMain: '#e5e7eb',
                        textMuted: '#9ca3af',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-darkBg text-textMain min-h-screen font-sans overflow-x-hidden">

    <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-cardBg sidebar-transition -translate-x-full z-50 shadow-2xl border-r border-gray-700">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold text-accent italic">Kategori</h2>
                <button onclick="toggleMenu()" class="text-textMuted hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <nav class="space-y-2" id="categoryNav"></nav>
        </div>
    </div>

    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/60 hidden z-40 backdrop-blur-sm"></div>

    <nav class="bg-cardBg border-b border-gray-700 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center gap-4">
            <button onclick="toggleMenu()" class="p-2 hover:bg-gray-700 rounded-xl text-accent transition-colors">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-xl md:text-2xl font-bold tracking-tight text-white flex-shrink-0">
                Pasar <span id="categoryTitle" class="text-accent italic">Equipment</span>
            </h1>
            
            <div class="flex-grow relative max-w-md ml-auto">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Cari item..." 
                    class="w-full pl-10 pr-4 py-2 bg-darkBg border border-gray-600 rounded-xl text-sm focus:ring-2 focus:ring-accent outline-none transition-all">
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div id="statusInfo" class="mb-6 text-sm text-textMuted flex justify-between items-center bg-cardBg/50 p-3 rounded-lg border border-gray-800">
            <span>Total: <b id="totalCount" class="text-white">0</b> item</span>
            <span id="pageIndicator" class="font-medium text-accent">Halaman 1</span>
        </div>

        <div id="itemGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6"></div>

        <div id="pagination" class="mt-12 flex justify-center items-center gap-4">
            <button id="prevBtn" onclick="changePage(-1)" class="px-6 py-2 bg-gray-800 border border-gray-700 rounded-xl hover:bg-gray-700 disabled:opacity-30 disabled:cursor-not-allowed transition">
                Prev
            </button>
            <span id="pageNumbers" class="text-sm font-bold text-gray-400">1 / 1</span>
            <button id="nextBtn" onclick="changePage(1)" class="px-6 py-2 bg-gray-800 border border-gray-700 rounded-xl hover:bg-gray-700 disabled:opacity-30 disabled:cursor-not-allowed transition">
                Next
            </button>
        </div>

        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-textMuted">
            <p>Item tidak ditemukan.</p>
        </div>
    </main>

    <script>
        let database = {};
        let currentCategory = "Equipment";
        let filteredItems = [];
        let currentPage = 1;
        const itemsPerPage = 20;

        async function init() {
            try {
                // Mengambil data dari JSON
                const response = await fetch('coa_items_v2.json');
                database = await response.json();
                
                setupCategoryNav();
                updateActiveList();
            } catch (err) {
                console.error("Gagal load JSON:", err);
            }
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function setupCategoryNav() {
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = '';
            const categories = ["All", ...Object.keys(database)];
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 rounded-xl transition font-medium ${cat === currentCategory ? 'bg-accent text-white shadow-lg' : 'hover:bg-gray-700 text-textMuted'}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    currentCategory = cat;
                    document.getElementById('categoryTitle').innerText = cat;
                    document.getElementById('searchInput').value = '';
                    currentPage = 1;
                    setupCategoryNav();
                    updateActiveList();
                    toggleMenu();
                };
                nav.appendChild(btn);
            });
        }

        function handleSearch() {
            currentPage = 1;
            updateActiveList();
        }

        function updateActiveList() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let items = [];

            if (currentCategory === "All") {
                Object.values(database).forEach(list => items = [...items, ...list]);
            } else {
                items = database[currentCategory] || [];
            }

            if (searchTerm) {
                items = items.filter(i => i.name.toLowerCase().includes(searchTerm));
            }

            filteredItems = items;
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('itemGrid');
            const empty = document.getElementById('emptyState');
            const totalLabel = document.getElementById('totalCount');
            
            grid.innerHTML = '';
            totalLabel.innerText = filteredItems.length;

            if (filteredItems.length === 0) {
                empty.classList.remove('hidden');
                document.getElementById('pagination').classList.add('hidden');
                return;
            }

            empty.classList.add('hidden');
            document.getElementById('pagination').classList.remove('hidden');

            // Kalkulasi Slicing untuk Halaman
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageItems = filteredItems.slice(startIndex, endIndex);

            pageItems.forEach(item => {
                // Mengikuti data price dari JSON
                const card = `
                    <div class="bg-cardBg p-4 rounded-2xl border border-gray-800 hover:border-accent transition-all duration-300 group shadow-lg flex flex-col items-center">
                        <div class="w-16 h-16 mb-3 bg-darkBg rounded-xl p-2 flex items-center justify-center border border-gray-700">
                            <img src="${item.image_url}" alt="${item.name}" class="max-w-full max-h-full object-contain">
                        </div>
                        <h3 class="text-xs font-bold text-center h-8 overflow-hidden line-clamp-2 text-white mb-1 leading-tight">
                            ${item.name}
                        </h3>
                        <div class="w-full text-center">
                            <p class="text-[10px] text-textMuted uppercase tracking-widest font-bold">Price</p>
                            <p class="font-black text-sm text-green-400">
                                ${item.price.toLocaleString()} G
                            </p>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });

            updatePaginationUI();
        }

        function updatePaginationUI() {
            const totalPages = Math.ceil(filteredItems.length / itemsPerPage) || 1;
            document.getElementById('pageNumbers').innerText = `${currentPage} / ${totalPages}`;
            document.getElementById('pageIndicator').innerText = `Halaman ${currentPage}`;
            
            document.getElementById('prevBtn').disabled = (currentPage === 1);
            document.getElementById('nextBtn').disabled = (currentPage === totalPages);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function changePage(step) {
            currentPage += step;
            renderGrid();
        }

        window.onload = init;
    </script>
</body>
</html>
