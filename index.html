<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant CoA Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b0f1a',
                        cardBg: '#161b2a',
                        accent: '#8b5cf6',
                        priceGreen: '#4ade80',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass { background: rgba(22, 27, 42, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-darkBg text-gray-200 min-h-screen pb-20">

    <nav class="sticky top-0 z-50 glass border-b border-gray-800 px-4 py-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
            <button onclick="toggleMenu()" class="p-2 bg-gray-800 rounded-lg text-accent">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="flex-grow max-w-xl relative">
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Cari item..." 
                    class="w-full bg-gray-900/50 border border-gray-700 rounded-full px-5 py-2 text-sm focus:ring-2 focus:ring-accent outline-none">
            </div>
            <div class="hidden md:block text-right">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Global Update</p>
                <p id="globalUpdate" class="text-xs text-accent">-</p>
            </div>
        </div>
    </nav>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-cardBg z-[60] transform -translate-x-full transition-transform duration-300 border-r border-gray-800 p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold text-white italic">Kategori</h2>
            <button onclick="toggleMenu()" class="text-gray-500">&times;</button>
        </div>
        <nav id="categoryNav" class="space-y-2"></nav>
    </div>
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/60 hidden z-50"></div>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        <header class="mb-6 flex justify-between items-end">
            <h1 id="categoryTitle" class="text-2xl font-extrabold text-white tracking-tight uppercase italic">Equipment</h1>
            <p class="text-xs text-gray-500"><span id="itemCount" class="text-white font-bold">0</span> Items found</p>
        </header>

        <div id="itemGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            </div>

        <div id="pagination" class="mt-12 flex justify-center items-center gap-3">
            <button id="prevBtn" onclick="changePage(-1)" class="p-2 bg-gray-800 rounded-lg disabled:opacity-20">&larr;</button>
            <div id="pageDots" class="flex gap-1"></div>
            <button id="nextBtn" onclick="changePage(1)" class="p-2 bg-gray-800 rounded-lg disabled:opacity-20">&rarr;</button>
        </div>
    </main>

    <script>
        let db = {};
        let currentCat = "Equipment";
        let filteredData = [];
        let page = 1;
        const perPage = 20;

        async function init() {
            try {
                // Mengambil database terbaru
                const res = await fetch('coa_items_v2_updated.json');
                db = await res.json();
                
                // Set Global Update dari item pertama yang ada
                const firstKey = Object.keys(db)[0];
                if(db[firstKey][0]) document.getElementById('globalUpdate').innerText = db[firstKey][0].last_update;

                setupNav();
                updateList();
            } catch (e) { console.error(e); }
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function setupNav() {
            const nav = document.getElementById('categoryNav');
            const cats = ["All", ...Object.keys(db)];
            nav.innerHTML = cats.map(c => `
                <button onclick="setCat('${c}')" class="w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition ${c === currentCat ? 'bg-accent text-white shadow-lg shadow-accent/20' : 'text-gray-500 hover:bg-gray-800'}">${c}</button>
            `).join('');
        }

        function setCat(c) {
            currentCat = c;
            page = 1;
            document.getElementById('categoryTitle').innerText = c;
            toggleMenu();
            setupNav();
            updateList();
        }

        function handleSearch() {
            page = 1;
            updateList();
        }

        function updateList() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            let all = [];
            if(currentCat === "All") Object.values(db).forEach(arr => all = [...all, ...arr]);
            else all = db[currentCat] || [];

            filteredData = all.filter(i => i.name.toLowerCase().includes(query));
            render();
        }

        function render() {
            const grid = document.getElementById('itemGrid');
            const start = (page - 1) * perPage;
            const items = filteredData.slice(start, start + perPage);
            
            document.getElementById('itemCount').innerText = filteredData.length;
            
            grid.innerHTML = items.map(i => `
                <div class="bg-cardBg border border-gray-800 rounded-2xl p-4 flex flex-col items-center text-center transition-all hover:border-accent">
                    <img src="${i.image_url}" class="w-14 h-14 object-contain mb-3 drop-shadow-[0_0_8px_rgba(139,92,246,0.3)]">
                    <h3 class="text-[11px] font-extrabold text-white leading-tight uppercase h-7 overflow-hidden">${i.name}</h3>
                    
                    <div class="mt-3 w-full bg-black/30 rounded-xl py-2 px-1">
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">Price</p>
                        <p class="text-xs font-black text-priceGreen">
                            ${(i.price_min && i.price_max) ? 
                                `${i.price_min.toLocaleString()} - ${i.price_max.toLocaleString()}` : 
                                i.price_min.toLocaleString()} G
                        </p>
                        <p class="text-[9px] text-gray-400 italic">/ ${i.unit || 'each'}</p>
                    </div>
                    
                    <p class="mt-3 text-[8px] text-gray-600 font-bold uppercase">Update: ${i.last_update || '-'}</p>
                </div>
            `).join('');

            updatePagination();
        }

        function updatePagination() {
            const total = Math.ceil(filteredData.length / perPage);
            document.getElementById('prevBtn').disabled = page === 1;
            document.getElementById('nextBtn').disabled = page === total || total === 0;
            document.getElementById('pageDots').innerHTML = `<span class="text-xs font-bold text-accent">${page} / ${total || 1}</span>`;
        }

        function changePage(step) {
            page += step;
            render();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        window.onload = init;
    </script>
</body>
</html>
