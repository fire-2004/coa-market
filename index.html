<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasar CoA - Merchant Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#111827',
                        cardBg: '#1f2937',
                        accent: '#8b5cf6',
                        textMain: '#e5e7eb',
                        textMuted: '#9ca3af',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-darkBg text-textMain min-h-screen font-sans overflow-x-hidden">

    <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-cardBg sidebar-transition -translate-x-full z-50 shadow-2xl border-r border-gray-700">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold text-accent italic">Kategori</h2>
                <button onclick="toggleMenu()" class="text-textMuted hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <nav class="space-y-2" id="categoryNav">
                </nav>
        </div>
    </div>

    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/60 hidden z-40 backdrop-blur-sm"></div>

    <nav class="bg-cardBg border-b border-gray-700 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center gap-4">
            <button onclick="toggleMenu()" class="p-2 hover:bg-gray-700 rounded-xl text-accent transition-colors">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="text-xl md:text-2xl font-bold tracking-tight text-white flex-shrink-0">
                Pasar <span id="categoryTitle" class="text-accent italic">Equipment</span>
            </h1>
            
            <div class="flex-grow relative max-w-md ml-auto">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="searchInput" oninput="searchItems()" placeholder="Cari item..." 
                    class="w-full pl-10 pr-4 py-2 bg-darkBg border border-gray-600 rounded-xl text-sm focus:ring-2 focus:ring-accent outline-none transition-all">
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div id="statusInfo" class="mb-6 text-sm text-textMuted flex justify-between items-center bg-cardBg/50 p-3 rounded-lg border border-gray-800">
            <span>Menampilkan: <b id="currentCount" class="text-white">0</b> item</span>
            <span id="lastUpdate" class="italic">Update: -</span>
        </div>

        <div id="itemGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6">
            </div>

        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-textMuted">
            <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <p>Item tidak ditemukan dalam kategori ini.</p>
        </div>
    </main>

    <script>
        let database = {};
        let currentCategory = "Equipment";

        async function init() {
            try {
                const response = await fetch('coa_items_v2.json');
                database = await response.json();
                
                setupCategoryNav();
                renderItems(currentCategory);
            } catch (err) {
                console.error("Gagal load JSON:", err);
                document.getElementById('itemGrid').innerHTML = `<p class="col-span-full text-center text-red-400">Gagal memuat file coa_items_v2.json</p>`;
            }
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function setupCategoryNav() {
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = '';
            
            // Tambahkan opsi "Semua Item"
            const categories = ["All", ...Object.keys(database)];
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 rounded-xl transition font-medium ${cat === currentCategory ? 'bg-accent text-white shadow-lg' : 'hover:bg-gray-700 text-textMuted'}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    currentCategory = cat;
                    document.getElementById('categoryTitle').innerText = cat;
                    document.getElementById('searchInput').value = '';
                    setupCategoryNav(); // Refresh menu active state
                    renderItems(cat);
                    toggleMenu();
                };
                nav.appendChild(btn);
            });
        }

        function renderItems(cat, searchTerm = "") {
            const grid = document.getElementById('itemGrid');
            const empty = document.getElementById('emptyState');
            const countLabel = document.getElementById('currentCount');
            const updateLabel = document.getElementById('lastUpdate');
            
            grid.innerHTML = '';
            let items = [];

            // Logic filter kategori
            if (cat === "All") {
                Object.values(database).forEach(list => items = [...items, ...list]);
            } else {
                items = database[cat] || [];
            }

            // Logic search
            if (searchTerm) {
                items = items.filter(i => i.name.toLowerCase().includes(searchTerm.toLowerCase()));
            }

            countLabel.innerText = items.length;
            if (items.length > 0 && items[0].last_update) {
                updateLabel.innerText = "Update: " + items[0].last_update;
            }

            if (items.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            items.forEach(item => {
                const card = `
                    <div class="bg-cardBg p-4 rounded-2xl border border-gray-800 hover:border-accent transition-all duration-300 group shadow-lg flex flex-col items-center">
                        <div class="w-16 h-16 mb-3 bg-darkBg rounded-xl p-2 flex items-center justify-center border border-gray-700 group-hover:scale-110 transition-transform">
                            <img src="${item.image_url}" alt="${item.name}" class="max-w-full max-h-full object-contain">
                        </div>
                        <h3 class="text-xs font-bold text-center h-8 overflow-hidden line-clamp-2 text-white mb-2 leading-tight">
                            ${item.name}
                        </h3>
                        <div class="mt-auto w-full pt-2 border-t border-gray-700/50">
                            <p class="text-center font-black text-sm text-green-400">
                                ${item.price === 0 ? 'Tanya Harga' : item.price.toLocaleString() + ' G'}
                            </p>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function searchItems() {
            const term = document.getElementById('searchInput').value;
            renderItems(currentCategory, term);
        }

        window.onload = init;
    </script>
</body>
</html>
