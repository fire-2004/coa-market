<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Market - CoA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#000000',      /* Black */
                        cardBg: '#0d0d0d',      /* Very Dark Grey */
                        accent: '#D4AF37',      /* Royal Gold */
                        goldLight: '#FFD700',   /* Bright Gold */
                        priceGreen: '#4ade80'
                    }
                }
            }
        }
    </script>
    <style>
        /* Tetap menggunakan Alagard jika file .ttf tersedia */
        @font-face {
            font-family: 'Alagard';
            src: url('font/Alagard.ttf') format('truetype');
            font-display: swap;
        }

        body { font-family: sans-serif; -webkit-tap-highlight-color: transparent; background-color: #000; }
        h1, h2, h3, .alagard-text { font-family: 'Alagard', sans-serif; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        
        .sticky-nav { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); }
        .coin-icon { font-size: 14px !important; vertical-align: middle; color: #FFD700; }
        
        /* Gaya Watermark untuk Kotak Item */
        .item-watermark {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.08; 
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="bg-darkBg text-gray-300 min-h-screen pb-20 overflow-x-hidden">

    <div class="sticky top-0 z-50 sticky-nav border-b border-accent/20">
        
        <header class="flex items-center justify-center py-3 border-b border-accent/10 gap-3">
            <img src="icon/icon.jpg" class="w-11 h-11 rounded-full border border-accent object-contain bg-black shadow-sm">
            <h1 class="text-2xl text-accent italic tracking-widest font-bold">LEGION MARKET</h1>
        </header>

        <nav class="px-4 py-2.5">
            <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
                <button onclick="toggleMenu()" class="p-2 bg-accent/10 rounded-lg text-accent border border-accent/30">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="flex-grow max-w-xl">
                    <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search item by name..." 
                        class="w-full bg-cardBg border border-accent/30 rounded-xl px-4 py-2 text-sm outline-none focus:border-goldLight text-white">
                </div>
                <div class="hidden sm:block text-right">
                    <p id="globalUpdate" class="text-[10px] text-accent font-bold uppercase tracking-tighter italic">Loading...</p>
                </div>
            </div>
        </nav>
    </div>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-cardBg z-[60] transition-transform duration-200 -translate-x-full border-r border-accent/30 p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-accent uppercase italic">Kategori</h2>
            <button onclick="toggleMenu()" class="text-gray-500 text-2xl">&times;</button>
        </div>
        <nav id="categoryNav" class="space-y-1.5 overflow-y-auto max-h-[calc(100vh-120px)]"></nav>
    </div>
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/80 hidden z-50"></div>

    <main class="max-w-6xl mx-auto px-4 mt-6">
        <header class="mb-6 flex justify-between items-end">
            <h2 id="categoryTitle" class="text-2xl text-white uppercase italic tracking-wider alagard-text">All Items</h2>
            <p class="text-[10px] text-accent font-bold uppercase bg-cardBg px-2 py-1 rounded border border-accent/20">
                <span id="itemCount" class="text-white">0</span> Items
            </p>
        </header>

        <div id="itemGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
            </div>

        <div id="pagination" class="mt-12 flex justify-center items-center gap-4">
            <button id="prevBtn" onclick="changePage(-1)" class="px-5 py-2 bg-cardBg border border-accent/30 text-accent rounded-lg text-xs font-bold disabled:opacity-20 italic">Prev</button>
            <span id="pageDots" class="text-xs font-bold text-accent px-2 alagard-text">1 / 1</span>
            <button id="nextBtn" onclick="changePage(1)" class="px-5 py-2 bg-cardBg border border-accent/30 text-accent rounded-lg text-xs font-bold disabled:opacity-20 italic">Next</button>
        </div>
    </main>

    <script>
        let db = {};
        let currentCat = "All"; // Set kategori default ke "All"
        let filteredData = [];
        let page = 1;
        const perPage = 20;
        const logoUrl = "icon/icon.jpg"; // Path Logo yang ter-apply untuk watermark

        async function init() {
            try {
                const res = await fetch('data/data.json');
                db = await res.json();
                
                // Mulai dengan kategori "All"
                currentCat = "All"; 
                document.getElementById('categoryTitle').innerText = "All Items";
                
                const firstCat = Object.keys(db)[0];
                if(db[firstCat] && db[firstCat][0]) {
                    document.getElementById('globalUpdate').innerText = "Last Update: " + db[firstCat][0].last_update;
                }

                setupNav();
                updateList();
            } catch (e) { console.error(e); }
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function setupNav() {
            const nav = document.getElementById('categoryNav');
            const cats = Object.keys(db);
            
            // Tambahkan tombol "All Items" di posisi paling atas
            let navHtml = `
                <button onclick="setCat('All')" class="w-full flex items-center gap-3 px-3 py-3 rounded text-[12px] font-bold uppercase transition-all ${currentCat === 'All' ? 'bg-accent text-black shadow-lg shadow-accent/20' : 'text-gray-500 hover:bg-white/5'}">
                    <img src="${logoUrl}" class="w-6 h-6 object-contain rounded-full">
                    <span class="truncate">All Items</span>
                </button>
            `;

            // Tambahkan sisa kategorinya
            navHtml += cats.map(c => {
                const firstImg = db[c][0]?.image_url || '';
                return `
                    <button onclick="setCat('${c}')" class="w-full flex items-center gap-3 px-3 py-3 rounded text-[12px] font-bold uppercase transition-all ${c === currentCat ? 'bg-accent text-black shadow-lg shadow-accent/20' : 'text-gray-500 hover:bg-white/5'}">
                        <img src="${firstImg}" class="w-6 h-6 object-contain">
                        <span class="truncate">${c}</span>
                    </button>
                `;
            }).join('');
            
            nav.innerHTML = navHtml;
        }

        function setCat(c) {
            currentCat = c;
            page = 1;
            document.getElementById('categoryTitle').innerText = c === "All" ? "All Items" : c;
            toggleMenu();
            setupNav();
            updateList();
        }

        function handleSearch() {
            page = 1;
            updateList();
        }

        function updateList() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            let all = [];
            
            // Logika untuk memuat semua item jika kategori "All" dipilih
            if (currentCat === "All") {
                Object.values(db).forEach(arr => {
                    all = all.concat(arr);
                });
            } else {
                all = db[currentCat] || [];
            }
            
            filteredData = all.filter(i => i.name.toLowerCase().includes(query));
            render();
        }

        function render() {
            const grid = document.getElementById('itemGrid');
            const start = (page - 1) * perPage;
            const items = filteredData.slice(start, start + perPage);
            
            document.getElementById('itemCount').innerText = filteredData.length;
            
            grid.innerHTML = items.map(i => `
                <div class="relative bg-cardBg border border-accent/20 rounded-2xl p-4 flex flex-col items-center text-center overflow-hidden">
                    <img src="${logoUrl}" class="item-watermark">

                    <img src="${i.image_url}" class="w-12 h-12 object-contain mb-3 drop-shadow-sm relative z-10">
                    
                    <h3 class="text-[13px] text-white capitalize font-black tracking-wide drop-shadow-md h-7 overflow-hidden leading-tight mb-1 relative z-10 alagard-text">${i.name}</h3>
                    
                    <div class="w-full bg-black/40 rounded-xl py-2 px-1 border border-accent/10 relative z-10">
                        <p class="text-[14px] text-goldLight alagard-text">
                            <span class="material-symbols-outlined coin-icon">monetization_on</span>
                            ${(i.price_min && i.price_max && i.price_min !== i.price_max) ? 
                                `${i.price_min.toLocaleString()} - ${i.price_max.toLocaleString()}` : 
                                i.price_min.toLocaleString()}
                        </p>
                        <p class="text-[8px] text-accent font-bold uppercase mt-1 italic tracking-widest">/ ${i.unit || 'each'}</p>
                    </div>
                    
                    <p class="mt-3 text-[7px] text-gray-600 font-bold uppercase tracking-[0.2em] relative z-10">${i.last_update || '-'}</p>
                </div>
            `).join('');

            updatePagination();
        }

        function updatePagination() {
            const total = Math.ceil(filteredData.length / perPage);
            document.getElementById('prevBtn').disabled = page === 1;
            document.getElementById('nextBtn').disabled = page === total || total === 0;
            document.getElementById('pageDots').innerText = `${page} / ${total || 1}`;
        }

        function changePage(step) {
            page += step;
            render();
            window.scrollTo({top: 0});
        }

        window.onload = init;
    </script>
</body>
</html>
