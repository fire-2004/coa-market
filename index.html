<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curse of Aros - Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b0f1a',
                        cardBg: '#161b2a',
                        accent: '#8b5cf6',
                        priceGreen: '#4ade80',
                        gold: '#fbbf24'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass { background: rgba(22, 27, 42, 0.95); backdrop-filter: blur(4px); }
        .sidebar-transition { transition: transform 0.2s ease-out; }
        /* Ikon Koin Custom */
        .coin-icon { font-size: 14px !important; vertical-align: middle; margin-right: 2px; color: #fbbf24; }
    </style>
</head>
<body class="bg-darkBg text-gray-200 min-h-screen pb-20 overflow-x-hidden">

    <nav class="sticky top-0 z-50 glass border-b border-gray-800 px-4 py-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
            <button onclick="toggleMenu()" class="p-2 bg-gray-800 rounded-lg text-accent">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="flex-grow max-w-xl">
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Cari item..." 
                    class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-2 text-sm outline-none focus:border-accent">
            </div>
            <div class="hidden sm:block text-right">
                <p id="globalUpdate" class="text-[10px] text-accent font-bold uppercase tracking-tighter">Loading...</p>
            </div>
        </div>
    </nav>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-cardBg z-[60] sidebar-transition -translate-x-full border-r border-gray-800 p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-black text-white uppercase tracking-tighter">CATEGORY</h2>
            <button onclick="toggleMenu()" class="text-gray-500 text-2xl">&times;</button>
        </div>
        <nav id="categoryNav" class="space-y-1.5 overflow-y-auto max-h-[calc(100vh-120px)]"></nav>
    </div>
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/60 hidden z-50"></div>

    <main class="max-w-6xl mx-auto px-4 mt-6">
        <header class="mb-6 flex justify-between items-end">
            <h1 id="categoryTitle" class="text-xl font-black text-white uppercase italic tracking-tight">Equipment</h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest bg-gray-900 px-2 py-1 rounded border border-gray-800">
                <span id="itemCount" class="text-accent">0</span> Items
            </p>
        </header>

        <div id="itemGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
            </div>

        <div id="pagination" class="mt-12 flex justify-center items-center gap-3">
            <button id="prevBtn" onclick="changePage(-1)" class="px-4 py-2 bg-gray-800 rounded-lg text-xs font-bold disabled:opacity-20">Prev</button>
            <span id="pageDots" class="text-xs font-bold text-accent px-2">1 / 1</span>
            <button id="nextBtn" onclick="changePage(1)" class="px-4 py-2 bg-gray-800 rounded-lg text-xs font-bold disabled:opacity-20">Next</button>
        </div>
    </main>

    <script>
        let db = {};
        let currentCat = "";
        let filteredData = [];
        let page = 1;
        const perPage = 20;

        async function init() {
            try {
                const res = await fetch('coa_items_v2_updated.json');
                db = await res.json();
                
                const cats = Object.keys(db);
                currentCat = cats[0];
                document.getElementById('categoryTitle').innerText = currentCat;
                
                if(db[currentCat][0]) document.getElementById('globalUpdate').innerText = "Update: " + db[currentCat][0].last_update;

                setupNav();
                updateList();
            } catch (e) { console.error(e); }
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function setupNav() {
            const nav = document.getElementById('categoryNav');
            const cats = Object.keys(db);
            // Menampilkan ikon dari baris pertama setiap kategori
            nav.innerHTML = cats.map(c => {
                const firstImg = db[c][0]?.image_url || '';
                return `
                    <button onclick="setCat('${c}')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-[11px] font-bold uppercase transition-colors ${c === currentCat ? 'bg-accent text-white' : 'text-gray-500 hover:bg-gray-800'}">
                        <img src="${firstImg}" class="w-6 h-6 object-contain">
                        <span class="truncate">${c}</span>
                    </button>
                `;
            }).join('');
        }

        function setCat(c) {
            currentCat = c;
            page = 1;
            document.getElementById('categoryTitle').innerText = c;
            toggleMenu();
            setupNav();
            updateList();
        }

        function handleSearch() {
            page = 1;
            updateList();
        }

        function updateList() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const all = db[currentCat] || [];
            filteredData = all.filter(i => i.name.toLowerCase().includes(query));
            render();
        }

        function render() {
            const grid = document.getElementById('itemGrid');
            const start = (page - 1) * perPage;
            const items = filteredData.slice(start, start + perPage);
            
            document.getElementById('itemCount').innerText = filteredData.length;
            
            // Ikon koin menggantikan huruf G
            // Shadow dihapus agar UI ringan
            grid.innerHTML = items.map(i => `
                <div class="bg-cardBg border border-gray-800 rounded-2xl p-4 flex flex-col items-center text-center">
                    <img src="${i.image_url}" class="w-12 h-12 object-contain mb-3">
                    <h3 class="text-[10px] font-bold text-white uppercase h-6 overflow-hidden leading-tight mb-2">${i.name}</h3>
                    
                    <div class="w-full bg-black/20 rounded-xl py-2 px-1 border border-gray-800/50">
                        <p class="text-[11px] font-black text-priceGreen">
                            <span class="material-symbols-outlined coin-icon">monetization_on</span>
                            ${(i.price_min && i.price_max && i.price_min !== i.price_max) ? 
                                `${i.price_min.toLocaleString()} - ${i.price_max.toLocaleString()}` : 
                                i.price_min.toLocaleString()}
                        </p>
                        <p class="text-[8px] text-gray-500 font-bold uppercase mt-0.5">/ ${i.unit || 'each'}</p>
                    </div>
                    
                    <p class="mt-3 text-[7px] text-gray-600 font-bold uppercase tracking-widest">${i.last_update || '-'}</p>
                </div>
            `).join('');

            updatePagination();
        }

        function updatePagination() {
            const total = Math.ceil(filteredData.length / perPage);
            document.getElementById('prevBtn').disabled = page === 1;
            document.getElementById('nextBtn').disabled = page === total || total === 0;
            document.getElementById('pageDots').innerText = `${page} / ${total || 1}`;
        }

        function changePage(step) {
            page += step;
            render();
            window.scrollTo({top: 0});
        }

        window.onload = init;
    </script>
</body>
</html>
